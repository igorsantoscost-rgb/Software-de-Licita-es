{% extends "base.html" %}
{% block titulo %}Novo Cliente{% endblock %}
{% block conteudo %}

<div class="page-header">
  <h2>Novo Cliente</h2>
</div>

<div class="card card-form">
  <form method="POST">
    <h3>Empresa</h3>
    <div class="campo">
      <label>Nome da Empresa *</label>
      <input type="text" name="nome" required placeholder="Ex: Empresa ABC Ltda">
    </div>
    <div class="campo">
      <label>CNPJ</label>
      <input type="text" name="cnpj" placeholder="00.000.000/0001-00">
    </div>

    <h3>Acesso do Cliente</h3>
    <div class="campo">
      <label>Nome do Usuário *</label>
      <input type="text" name="nome_usuario" required placeholder="Nome completo">
    </div>
    <div class="campo">
      <label>E-mail de Acesso *</label>
      <input type="email" name="email_usuario" required placeholder="email@empresa.com">
    </div>
    <div class="campo">
      <label>Senha *</label>
      <input type="password" name="senha_usuario" required placeholder="Senha inicial">
    </div>

    <div class="form-btns">
      <a href="{{ url_for('main.clientes') }}" class="btn">Cancelar</a>
      <button type="submit" class="btn btn-primary">Criar Cliente</button>
    </div>
  </form>
</div>

{% endblock %}
